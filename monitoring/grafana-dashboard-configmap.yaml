apiVersion: v1
kind: ConfigMap
metadata:
  name: poding-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: poding-overview-dashboard
    app.kubernetes.io/part-of: poding-monitoring
  annotations:
    grafana_folder: "Pod-ing"
data:
  poding-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Detector Up",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "Down"
                    },
                    "1": {
                      "color": "green",
                      "index": 1,
                      "text": "Up"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(poding_detector_up{namespace=\"poding-system\"} or on() vector(0))",
              "legendFormat": "detector_up",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Alert Active",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "color": "green",
                      "index": 0,
                      "text": "No Active Alert"
                    },
                    "1": {
                      "color": "red",
                      "index": 1,
                      "text": "Active"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(poding_alert_active{scenario=~\"$scenario_filter\"}) or vector(0)",
              "legendFormat": "alert_active",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Recent Detection Time",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-RdYlGr"
              },
              "unit": "dateTimeAsIso"
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(10, poding_last_detection_timestamp_seconds{scenario=~\"$scenario_filter\"}) * 1000",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "bargauge",
          "title": "Alert Severity",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (severity) (poding_alert_active{scenario=~\"$scenario_filter\"})",
              "legendFormat": "{{severity}}",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "Pod FSM State",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-RdYlGr"
              }
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "poding_attack_node_state{scenario=~\"$scenario_filter\",namespace=~\"$target_namespaces\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "FSM Progress Ratio",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "max by (namespace,pod,scenario,state) (poding_fsm_progress_ratio{namespace=~\"$target_namespaces\",scenario=~\"$scenario_filter\"})",
              "legendFormat": "{{namespace}}/{{pod}} [{{state}}]",
              "range": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "table",
          "title": "Suspect Pod Summary",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-RdYlGr"
              }
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(10, poding_last_detection_timestamp_seconds{scenario=~\"$scenario_filter\"})",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "poding",
        "overview",
        "security"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": ".*",
              "value": ".*"
            },
            "hide": 0,
            "label": "Scenario",
            "name": "scenario_filter",
            "options": [
              {
                "selected": true,
                "text": ".*",
                "value": ".*"
              },
              {
                "selected": false,
                "text": "attack-lab-01_pod-a",
                "value": "attack-lab-01_pod-a"
              },
              {
                "selected": false,
                "text": "cluster-wide",
                "value": "cluster-wide"
              }
            ],
            "query": ".*",
            "skipUrlSync": false,
            "type": "custom"
          },
          {
            "current": {
              "selected": false,
              "text": "attack-lab|poding-system|monitoring|kube-system|default",
              "value": "attack-lab|poding-system|monitoring|kube-system|default"
            },
            "hide": 0,
            "label": "Namespaces",
            "name": "target_namespaces",
            "options": [
              {
                "selected": true,
                "text": "attack-lab|poding-system|monitoring|kube-system|default",
                "value": "attack-lab|poding-system|monitoring|kube-system|default"
              },
              {
                "selected": false,
                "text": "attack-lab|poding-system",
                "value": "attack-lab|poding-system"
              }
            ],
            "query": "attack-lab|poding-system|monitoring|kube-system|default",
            "skipUrlSync": false,
            "type": "custom"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "",
      "title": "Pod-ing Overview",
      "uid": "poding-overview",
      "version": 2
    }
