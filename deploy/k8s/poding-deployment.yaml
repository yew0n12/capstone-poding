apiVersion: apps/v1
kind: Deployment
metadata:
  name: poding-detector
  namespace: poding-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poding-detector
  template:
    metadata:
      labels:
        app: poding-detector
    spec:
      serviceAccountName: poding-detector
      nodeSelector:
        kubernetes.io/hostname: k8s-cp
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: detector
          image: poding:prototype
          imagePullPolicy: IfNotPresent
          command: ["python3", "live/live_pipeline.py"]
          env:
            - name: PODING_CONFIG
              value: /etc/poding/config.yaml
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/poding/config.yaml
              subPath: config.yaml
            - name: poding-results
              mountPath: /home/yw/poding/results
      volumes:
        - name: config
          configMap:
            name: poding-config
        - name: poding-results
          hostPath:
            path: /home/yw/poding/results
            type: DirectoryOrCreate
