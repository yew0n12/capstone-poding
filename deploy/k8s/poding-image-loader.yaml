apiVersion: v1
kind: Pod
metadata:
  name: poding-image-loader
  namespace: poding-system
spec:
  restartPolicy: Never
  hostPID: true
  nodeName: k8s-cp
  containers:
    - name: loader
      image: poding:prototype
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
